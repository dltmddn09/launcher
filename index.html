<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 업무 도구</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F4F0;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.16);
    --text-primary: #1A1A1A;
    --text-secondary: #6B6B6B;
    --text-muted: #A0A0A0;
    --accent-purple: #534AB7;
    --accent-purple-bg: #EEEDFE;
    --accent-teal: #0F6E56;
    --accent-teal-bg: #E1F5EE;
    --badge-github-bg: #E8E6DF;
    --badge-github-text: #444441;
    --badge-local-bg: #E1F5EE;
    --badge-local-text: #0F6E56;
  }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }

  .container {
    width: 100%;
    max-width: 640px;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }

  header p {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, transform 0.12s, box-shadow 0.15s;
    cursor: pointer;
  }

  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
  }

  .card:active {
    transform: translateY(0px);
    box-shadow: none;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .icon-purple { background: var(--accent-purple-bg); color: var(--accent-purple); }
  .icon-teal { background: var(--accent-teal-bg); color: var(--accent-teal); }

  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
  }

  .badge-github { background: var(--badge-github-bg); color: var(--badge-github-text); }
  .badge-local  { background: var(--badge-local-bg);  color: var(--badge-local-text);  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    flex: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-top: 10px;
    border-top: 0.5px solid var(--border);
  }

  .open-btn {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .open-btn svg {
    width: 13px;
    height: 13px;
    opacity: 0.6;
  }

  footer {
    margin-top: 1.75rem;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>내 업무 도구</h1>
    <p>자주 쓰는 도구 모음</p>
  </header>

  <div class="grid">

    <a class="card" href="https://dltmddn09.github.io/patchnote-converter/" target="_blank" rel="noopener">
      <div class="card-top">
        <div class="icon icon-purple">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/>
            <line x1="9" y1="9" x2="10" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/>
          </svg>
        </div>
        <span class="badge badge-github">GitHub</span>
      </div>
      <p class="card-title">패치노트 변환기</p>
      <p class="card-desc">패치노트를 원하는 형식으로 변환</p>
      <div class="card-footer">
        <span class="open-btn">
          열기
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </span>
      </div>
    </a>

    <a class="card" href="https://dltmddn09.github.io/heybox-calculator/" target="_blank" rel="noopener">
      <div class="card-top">
        <div class="icon icon-teal">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            <polyline points="7 10 12 15 17 10"/>
          </svg>
        </div>
        <span class="badge badge-github">GitHub</span>
      </div>
      <p class="card-title">헤이박스 판매량 계산기</p>
      <p class="card-desc">헤이박스 판매량 확인 및 계산</p>
      <div class="card-footer">
        <span class="open-btn">
          열기
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </span>
      </div>
    </a>

  </div>

  <footer>도구를 추가하려면 HTML 파일을 직접 수정하세요</footer>
</div>

</body>
</html>
